name: Build packaged app

# PyInstaller cannot cross-compile, so each OS artifact is built on its own
# runner. Produces an onedir "localhost app" per OS (bridge + prebuilt web UI).
# Ships NO model weights and NO inference binary (see CLAUDE.md).

on:
  workflow_dispatch:        # manual: Actions tab -> Run workflow
  pull_request:
    branches: [main]        # verify the build on every PR to main
  push:
    tags: ['v*']            # auto-build on version tags (e.g. v0.1.0)

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false      # one OS failing must not cancel the others
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: simulator/web/package-lock.json

      - name: Build web UI
        working-directory: simulator/web
        run: |
          npm ci
          npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'   # broadly PyInstaller-tested; uniform across runners

      - name: Install build deps
        run: python -m pip install --upgrade pip pyinstaller websockets

      - name: Build onedir bundle
        run: pyinstaller pepper-studio.spec --noconfirm

      - name: Smoke test (launch + serve)
        shell: bash      # available on the Windows runner too (Git Bash)
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then BIN="dist/pepper-studio/pepper-studio.exe"; else BIN="dist/pepper-studio/pepper-studio"; fi
          SIM_OPEN_BROWSER=0 "$BIN" & PID=$!
          code=$(curl -s --retry 30 --retry-delay 1 --retry-connrefused -o /dev/null -w "%{http_code}" http://localhost:5001/ai/config || true)
          kill "$PID" 2>/dev/null || true
          echo "smoke: GET /ai/config -> $code"
          [ "$code" = "200" ]

      - uses: actions/upload-artifact@v4
        with:
          name: pepper-studio-${{ runner.os }}   # Linux / macOS / Windows
          path: dist/pepper-studio
          if-no-files-found: error
